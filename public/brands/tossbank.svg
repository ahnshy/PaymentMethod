<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 636 260" width="636" height="260" role="img" aria-labelledby="toss-title">
  <title id="toss-title">Toss Bank Logo</title>

  <style>
    .grid-dot {
    fill: #2F80ED;
    opacity: 0.18;
    }

    .toss-word {
    fill: rgb(97, 97, 97);
    font-family: "Inter", "Pretendard", "Noto Sans KR", Arial, sans-serif;
    font-size: 72px;
    font-weight: 800;
    letter-spacing: 4px;
    }
  </style>

  <defs>
    <!-- Dotted background pattern -->
    <pattern id="dot-grid" width="16" height="16" patternUnits="userSpaceOnUse">
      <circle class="grid-dot" cx="1.2" cy="1.2" r="0.8"/>
    </pattern>

    <!-- Toss icon gradients -->
    <linearGradient id="toss-light" x1="8" y1="18" x2="72" y2="76" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7DB7FF"/>
      <stop offset="0.52" stop-color="#377DFF"/>
      <stop offset="1" stop-color="#1557FF"/>
    </linearGradient>

    <linearGradient id="toss-deep" x1="54" y1="4" x2="94" y2="95" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1D7BFF"/>
      <stop offset="0.52" stop-color="#184BFF"/>
      <stop offset="1" stop-color="#071FD2"/>
    </linearGradient>

    <filter id="icon-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#0B4DFF" flood-opacity="0.28"/>
    </filter>
  </defs>

  <!-- Dotted background -->
  <rect x="0" y="0" width="636" height="260" fill="url(#dot-grid)"/>

  <!-- Toss icon -->
  <g transform="translate(6 80)" filter="url(#icon-shadow)">
    <path
            d="M50.5 7.2C25.1 14.9 4.7 31.7 1.2 49.3C-2.7 69.3 17.8 80.1 47.1 75.1C59.4 73 71.1 67.8 80.2 59.8L63.2 2.1C59.2 2.8 54.9 4.1 50.5 7.2Z"
            fill="url(#toss-light)"
    />

    <path
            d="M63.2 2.1C95.1 5.2 115.3 21.7 111.4 43.4C106.8 69.4 72.2 93.6 31.5 98.1L63.2 2.1Z"
            fill="url(#toss-deep)"
    />
  </g>

  <!-- Wordmark -->
  <text x="178" y="158" class="toss-word">tossbank</text>
</svg>
